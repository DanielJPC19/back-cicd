version: '3.9'

services:

  db-postgres:
    image: postgres:16
    container_name: postgres-db
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
    volumes:
      - pg-data:/var/lib/postgresql/data

  nest-app:
    build: .
    container_name: nest-api
    restart: always
    depends_on:
      - db-postgres
    ports:
      - "3500:3500"
    env_file:
      - .env

volumes:
  pg-data: